<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>BRK Button Manager</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#0f172a;--bg2:#1a2233;--bg3:#1e2a3a;--border:#2d3a4d;--text:#e8eaf6;--sub:#8b95a5;--accent:#1f93ff;--danger:#ef4444;--success:#22c55e;--input:#131a27}
  body{font-family:-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  .container{max-width:900px;margin:0 auto;padding:24px}
  .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
  .header h1{font-size:20px;display:flex;align-items:center;gap:10px}
  .header h1 em{font-size:24px;font-style:normal}
  .badge{font-size:11px;background:var(--bg3);padding:2px 8px;border-radius:10px;color:var(--sub)}
  .btn{border:none;border-radius:8px;padding:10px 20px;font:600 13px -apple-system,system-ui,sans-serif;cursor:pointer;transition:all .15s}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:hover{opacity:.9}
  .btn-secondary{background:transparent;border:1px solid var(--border);color:var(--text)}
  .btn-danger{background:transparent;color:var(--danger);border:1px solid var(--danger)}
  .empty{text-align:center;padding:60px 20px}
  .empty .icon{font-size:48px;margin-bottom:12px}
  .empty .title{font-size:16px;font-weight:600;margin-bottom:6px}
  .empty .sub{font-size:13px;color:var(--sub)}
  .table-header{display:grid;grid-template-columns:70px 1fr 120px 100px 90px;gap:12px;padding:8px 14px;font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.04em}
  .table-row{display:grid;grid-template-columns:70px 1fr 120px 100px 90px;gap:12px;padding:12px 14px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);margin-bottom:6px;align-items:center;cursor:pointer;transition:background .15s, border .1s, opacity .15s}
  .table-row:hover{background:var(--bg2)}
  .toggle{width:36px;height:20px;border-radius:10px;border:none;cursor:pointer;position:relative;transition:background .2s;padding:0}
  .toggle.on{background:var(--accent)}
  .toggle.off{background:#64748b}
  .toggle .dot{width:16px;height:16px;border-radius:50%;background:#fff;position:absolute;top:2px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
  .toggle.on .dot{left:18px}
  .toggle.off .dot{left:2px}
  .btn-icon{width:28px;height:28px;border:none;background:transparent;cursor:pointer;border-radius:6px;font-size:14px;display:flex;align-items:center;justify-content:center;transition:background .15s;color:var(--sub)}
  .btn-icon:hover{background:rgba(255,255,255,.08)}
  .actions{display:flex;gap:2px;justify-content:flex-end}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
  .modal{background:var(--bg);border-radius:12px;width:560px;max-width:100%;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.6);overflow:hidden}
  .modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--bg2);flex-shrink:0}
  .modal-header h2{font-size:16px}
  .modal-body{flex:1;overflow-y:auto;padding:20px}
  .modal-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--bg2);flex-shrink:0}
  .tabs{display:flex;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0}
  .tab{border:none;background:transparent;padding:10px 20px;font:600 13px -apple-system,system-ui,sans-serif;color:var(--sub);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent)}
  .form-group{margin-bottom:14px}
  .form-label{display:block;font-size:11px;font-weight:600;color:var(--sub);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
  .form-input,.form-select,.form-textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--input);color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border-color .2s,box-shadow .2s}
  .form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(31,147,255,.15)}
  .form-textarea{resize:vertical;min-height:60px}
  .form-row{display:grid;grid-template-columns:1fr auto;gap:12px}
  .form-hint{font-size:11px;color:var(--sub);margin-top:3px}
  .checkbox-item{display:flex;gap:10px;padding:12px;background:var(--bg3);border-radius:8px;border:1px solid var(--border);margin-bottom:6px;cursor:pointer}
  .checkbox-item label{font-size:13px;font-weight:600;cursor:pointer}
  .checkbox-item .hint{font-size:11px;color:var(--sub);margin-top:2px}
  .perm-item{display:inline-flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:16px;padding:4px 8px 4px 4px;margin:0 6px 6px 0;font-size:13px}
  .perm-avatar{width:22px;height:22px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
  .perm-avatar.team{background:var(--success)}
  .perm-remove{background:transparent;border:none;color:var(--sub);cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:50%;width:18px;height:18px;transition:all .15s}
  .perm-remove:hover{background:var(--danger);color:#fff}
  .tree-select{max-height:260px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;background:var(--input)}
  .tree-group{border-bottom:1px solid var(--border)}
  .tree-group:last-child{border-bottom:none}
  .tree-group-header{display:flex;align-items:center;gap:8px;padding:10px 12px;cursor:pointer;transition:background .15s;user-select:none}
  .tree-group-header:hover{background:rgba(255,255,255,.04)}
  .tree-group-header .tree-arrow{font-size:10px;color:var(--sub);transition:transform .2s;width:14px;text-align:center;flex-shrink:0}
  .tree-group-header .tree-arrow.open{transform:rotate(90deg)}
  .tree-group-header label{font-size:13px;font-weight:600;cursor:pointer;flex:1}
  .tree-group-header .tree-count{font-size:11px;color:var(--sub);margin-left:auto}
  .tree-members{padding:0 0 4px 0;display:none}
  .tree-members.open{display:block}
  .tree-member{display:flex;align-items:center;gap:8px;padding:6px 12px 6px 38px;cursor:pointer;transition:background .15s;user-select:none}
  .tree-member:hover{background:rgba(255,255,255,.04)}
  .tree-member label{font-size:12px;cursor:pointer;color:var(--text)}
  .tree-member .tree-member-email{font-size:11px;color:var(--sub);margin-left:4px}
  .tree-check{width:16px;height:16px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
  .user-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--bg3);border-radius:6px;border:1px solid var(--border);margin-bottom:4px}
  .user-avatar{width:28px;height:28px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
  .footer-count{font-size:11px;color:var(--sub)}
  .hidden{display:none}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1><em>⚡</em> BRK Button Manager <span class="badge">v1.0</span></h1>
    <div style="display:flex;gap:10px">
      <button class="btn btn-secondary" id="btn-analytics">📊 Analytics</button>
      <button class="btn btn-primary" id="btn-criar">+ Criar botão</button>
    </div>
  </div>
  
  <div id="view-home">
    <div id="list"></div>
    <div style="margin-top:12px;display:flex;justify-content:space-between;align-items:center">
      <span class="footer-count" id="count"></span>
    </div>
  </div>

  <div id="view-analytics" class="hidden">
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:24px">
      <div style="background:var(--bg3);padding:24px;border-radius:12px;border:1px solid var(--border)">
        <div style="font-size:11px;color:var(--sub);font-weight:700;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.04em">TOTAL DE CLIQUES</div>
        <div id="stat-all" style="font-size:36px;font-weight:700;color:var(--text)">0</div>
      </div>
      <div style="background:var(--bg3);padding:24px;border-radius:12px;border:1px solid var(--border)">
        <div style="font-size:11px;color:var(--sub);font-weight:700;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.04em">CLIQUES NESTE MÊS</div>
        <div id="stat-month" style="font-size:36px;font-weight:700;color:var(--accent)">0</div>
      </div>
      <div style="background:var(--bg3);padding:24px;border-radius:12px;border:1px solid var(--border)">
        <div style="font-size:11px;color:var(--sub);font-weight:700;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.04em">CLIQUES HOJE</div>
        <div id="stat-today" style="font-size:36px;font-weight:700;color:var(--success)">0</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
      <div style="background:var(--bg2);border-radius:12px;border:1px solid var(--border);overflow:hidden">
        <div style="padding:16px 20px;font-weight:600;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:14px">🔥 Botões mais usados</div>
        <div id="stat-top-buttons" style="padding:10px 20px">Carregando...</div>
      </div>
      <div style="background:var(--bg2);border-radius:12px;border:1px solid var(--border);overflow:hidden">
        <div style="padding:16px 20px;font-weight:600;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:14px">🏆 Ranking de Usuários</div>
        <div id="stat-top-users" style="padding:10px 20px">Carregando...</div>
      </div>
    </div>
  </div>
</div>

<div id="modal-overlay" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">Criar botão</h2>
      <button class="btn-icon" id="btn-close-modal" style="font-size:18px">✕</button>
    </div>
    <div class="tabs" id="tabs-bar"></div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer">
      <div id="modal-delete"></div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-secondary" id="btn-cancel">Cancelar</button>
        <button class="btn btn-primary" id="btn-save">Salvar</button>
      </div>
    </div>
  </div>
</div>

<script>
var API_URL = 'https://n8n-brk-buttons.pqcilq.easypanel.host/api';
var buttons = [];
var editBtn = null;
var editIdx = null;
var activeTab = 'acoes';

// ── Event listeners ──
let currentView = 'home';
document.getElementById('btn-analytics').addEventListener('click', function() {
  if (currentView === 'home') {
    currentView = 'analytics';
    this.innerHTML = '← Voltar à Lista';
    this.classList.replace('btn-secondary', 'btn-primary');
    document.getElementById('view-home').classList.add('hidden');
    document.getElementById('view-analytics').classList.remove('hidden');
    document.getElementById('btn-criar').classList.add('hidden');
    loadAnalytics();
  } else {
    currentView = 'home';
    this.innerHTML = '📊 Analytics';
    this.classList.replace('btn-primary', 'btn-secondary');
    document.getElementById('view-home').classList.remove('hidden');
    document.getElementById('view-analytics').classList.add('hidden');
    document.getElementById('btn-criar').classList.remove('hidden');
  }
});
document.getElementById('btn-criar').addEventListener('click', function(){ openEditor(null); });
document.getElementById('btn-close-modal').addEventListener('click', closeEditor);
document.getElementById('btn-cancel').addEventListener('click', closeEditor);
document.getElementById('btn-save').addEventListener('click', saveButton);
document.getElementById('modal-overlay').addEventListener('click', function(e){ if(e.target===this) closeEditor(); });

// ── API ──
function api(path, method, body) {
  var opts = { method: method || 'GET', headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  return fetch(API_URL + path, opts).then(function(r){ return r.json(); });
}

// ── Load ──
function load() {
  api('/buttons', 'GET').then(function(res) {
    buttons = res.data || [];
    render();
  }).catch(function(err) {
    console.error('Load error:', err);
    buttons = [];
    render();
  });
}

// ── Load Analytics ──
function loadAnalytics() {
  api('/analytics/stats', 'GET').then(function(res) {
    if(!res.totals) return;
    document.getElementById('stat-all').textContent = res.totals.all;
    document.getElementById('stat-month').textContent = res.totals.month;
    document.getElementById('stat-today').textContent = res.totals.today;
    
    var btnsHtml = '';
    if(res.buttons && res.buttons.length){
      for(var i=0; i<res.buttons.length; i++){
        var b = res.buttons[i];
        btnsHtml += '<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)">' +
          '<div style="display:flex;align-items:center;gap:10px"><span>'+(b.icon||'🔘')+'</span><span style="font-weight:500;font-size:13px">'+(b.label||'Sem nome')+'</span></div>' +
          '<div style="font-size:14px;font-weight:700;color:var(--accent)">'+b.clicks+' <span style="font-size:11px;color:var(--sub);font-weight:400">cliques</span></div></div>';
      }
    } else { btnsHtml = '<div class="empty" style="padding:30px"><div class="icon">📊</div><div class="sub">Nenhum dado</div></div>'; }
    document.getElementById('stat-top-buttons').innerHTML = btnsHtml;

    var usersHtml = '';
    if(res.users && res.users.length){
      for(var i=0; i<res.users.length; i++){
        var u = res.users[i];
        usersHtml += '<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)">' +
          '<div style="display:flex;align-items:center;gap:10px"><div class="user-avatar" style="width:24px;height:24px;font-size:10px">'+(u.user_email?u.user_email.substring(0,2).toUpperCase():'?')+'</div><span style="font-size:13px">'+(u.user_email||'Desconhecido')+'</span></div>' +
          '<div style="font-size:14px;font-weight:700;color:var(--success)">'+u.clicks+' <span style="font-size:11px;color:var(--sub);font-weight:400">cliques</span></div></div>';
      }
    } else { usersHtml = '<div class="empty" style="padding:30px"><div class="icon">👥</div><div class="sub">Nenhum dado</div></div>'; }
    document.getElementById('stat-top-users').innerHTML = usersHtml;
  });
}

// ── Render List ──
function render() {
  var el = document.getElementById('list');
  document.getElementById('count').textContent = buttons.length + ' botão(ões) configurados';

  if (!buttons.length) {
    el.innerHTML = '<div class="empty"><div class="icon">📭</div><div class="title">Nenhum botão criado</div><div class="sub">Clique em "+ Criar botão" para começar.</div></div>';
    return;
  }

  var html = '<div class="table-header"><span>AT.</span><span>TEXTO NO BOTÃO</span><span>AÇÃO</span><span>VISÍVEL</span><span style="text-align:right">OPÇÕES</span></div>';

  for (var i = 0; i < buttons.length; i++) {
    var b = buttons[i];
    var actionLabel = b.action_type === 'webhook' ? '⚡ Webhook' : b.action_type === 'link' ? '🔗 Link' : '🪟 Modal';
    var vis = !b.visible_to || !b.visible_to.length ? '👁 Todos' : '👤 ' + b.visible_to.length;
    var desc = b.description ? '<div style="font-size:11px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + b.description + '</div>' : '';

    html += '<div class="table-row" draggable="true" ondragstart="brkDrag(event,'+i+')" ondragend="brkDragEnd(event)" ondragover="brkDragOver(event)" ondragleave="brkDragLeave(event)" ondrop="brkDrop(event,'+i+')" data-edit="' + i + '">' +
      '<div style="display:flex;align-items:center;gap:6px"><span style="cursor:grab;color:var(--sub);font-size:16px;user-select:none" title="Arraste para reordenar" onmousedown="event.stopPropagation()">⠿</span><button class="toggle ' + (b.active !== false ? 'on' : 'off') + '" data-toggle="' + i + '"><div class="dot"></div></button></div>' +
      '<div style="display:flex;align-items:center;gap:8px;min-width:0"><span style="font-size:16px;flex-shrink:0">' + (b.icon || '🔘') + '</span><div style="min-width:0"><div style="font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + (b.label || 'Sem nome') + '</div>' + desc + '</div></div>' +
      '<span style="font-size:12px;color:var(--sub)">' + actionLabel + '</span>' +
      '<span style="font-size:12px;color:var(--sub)">' + vis + '</span>' +
      '<div class="actions">' +
        '<button class="btn-icon" data-edit-btn="' + i + '" title="Editar">✏️</button>' +
        '<button class="btn-icon" data-dup="' + i + '" title="Duplicar">📋</button>' +
        '<button class="btn-icon" data-del="' + i + '" title="Excluir" style="color:var(--danger)">🗑️</button>' +
      '</div>' +
    '</div>';
  }

  el.innerHTML = html;

  // Bind events via delegation
  el.addEventListener('click', function(e) {
    var target = e.target.closest('[data-toggle]');
    if (target) { e.stopPropagation(); toggleBtn(parseInt(target.getAttribute('data-toggle'))); return; }
    target = e.target.closest('[data-dup]');
    if (target) { e.stopPropagation(); dupBtn(parseInt(target.getAttribute('data-dup'))); return; }
    target = e.target.closest('[data-del]');
    if (target) { e.stopPropagation(); delBtn(parseInt(target.getAttribute('data-del'))); return; }
    target = e.target.closest('[data-edit-btn]');
    if (target) { e.stopPropagation(); openEditor(parseInt(target.getAttribute('data-edit-btn'))); return; }
    target = e.target.closest('[data-edit]');
    if (target) { openEditor(parseInt(target.getAttribute('data-edit'))); }
  });
}

// ── Drag & Drop ──
var draggedIdx = null;
window.brkDrag = function(e, idx) {
  draggedIdx = idx;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', idx);
  setTimeout(function(){ e.target.style.opacity = '0.4'; }, 0);
};
window.brkDragEnd = function(e) {
  e.target.style.opacity = '1';
};
window.brkDragOver = function(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  var row = e.target.closest('.table-row');
  if (row) row.style.borderTop = '2px dashed var(--accent)';
};
window.brkDragLeave = function(e) {
  var row = e.target.closest('.table-row');
  if (row) row.style.borderTop = '1px solid var(--border)';
};
window.brkDrop = function(e, targetIdx) {
  e.preventDefault();
  var row = e.target.closest('.table-row');
  if (row) row.style.borderTop = '1px solid var(--border)';
  if (draggedIdx === null || draggedIdx === targetIdx) return;
  var item = buttons.splice(draggedIdx, 1)[0];
  buttons.splice(targetIdx, 0, item);
  render();
  var orderIds = buttons.map(function(b){ return b.id; });
  api('/buttons/reorder', 'POST', { order: orderIds });
};

// ── Toggle ──
function toggleBtn(i) {
  var b = buttons[i];
  b.active = (b.active === false) ? true : false;
  api('/buttons/' + b.id, 'PUT', b).then(load);
}

// ── Duplicate ──
function dupBtn(i) {
  var clone = JSON.parse(JSON.stringify(buttons[i]));
  delete clone.id;
  clone.label = (clone.label || '') + ' (cópia)';
  api('/buttons', 'POST', clone).then(load);
}

// ── Delete ──
function delBtn(i) {
  if (!confirm('Excluir este botão?')) return;
  api('/buttons/' + buttons[i].id, 'DELETE').then(load);
}

// ── Editor ──
function openEditor(idx) {
  editIdx = idx;
  if (idx === null) {
    editBtn = { label:'', icon:'🔘', description:'', action_type:'webhook', action_url:'', http_method:'POST', color:'#1f93ff', modal_html:'', new_tab:true, active:true, dynamic:false, single_use:false, visible_to:[], conditions:[], group_name:'' };
  } else {
    editBtn = JSON.parse(JSON.stringify(buttons[idx]));
    if (!editBtn.conditions) editBtn.conditions = [];
    if (!editBtn.visible_to) editBtn.visible_to = [];
  }

  document.getElementById('modal-title').textContent = idx === null ? 'Criar botão' : 'Editar botão';
  document.getElementById('modal-delete').innerHTML = idx !== null ? '<button class="btn btn-danger" id="btn-del-editor">EXCLUIR</button>' : '';

  if (idx !== null) {
    var delEditorBtn = document.getElementById('btn-del-editor');
    if (delEditorBtn) delEditorBtn.addEventListener('click', function(){ delBtn(idx); closeEditor(); });
  }

  activeTab = 'acoes';
  renderTabs();
  renderTab();
  document.getElementById('modal-overlay').classList.remove('hidden');
}

function closeEditor() {
  document.getElementById('modal-overlay').classList.add('hidden');
}

function renderTabs() {
  var tabs = [
    { key: 'acoes', label: 'Ações' },
    { key: 'condicoes', label: 'Condições' },
    { key: 'exibicao', label: 'Exibição' }
  ];
  var bar = document.getElementById('tabs-bar');
  bar.innerHTML = '';
  for (var i = 0; i < tabs.length; i++) {
    var t = tabs[i];
    var btn = document.createElement('button');
    btn.className = 'tab' + (activeTab === t.key ? ' active' : '');
    btn.textContent = t.label;
    btn.setAttribute('data-tab', t.key);
    btn.addEventListener('click', function(e) {
      syncForm();
      activeTab = e.target.getAttribute('data-tab');
      renderTabs();
      renderTab();
    });
    bar.appendChild(btn);
  }
}

function syncForm() {
  if (!editBtn) return;
  function v(id) { var el = document.getElementById(id); return el ? el.value : ''; }
  function c(id) { var el = document.getElementById(id); return el ? el.checked : false; }

  if (activeTab === 'acoes') {
    editBtn.label = v('f-label') || editBtn.label;
    editBtn.icon = v('f-icon') || editBtn.icon;
    editBtn.description = v('f-desc') || '';
    editBtn.action_type = v('f-action') || editBtn.action_type;
    editBtn.action_url = v('f-url') || '';
    editBtn.http_method = v('f-method') || 'POST';
    editBtn.color = v('f-color') || '#1f93ff';
    editBtn.modal_html = v('f-modal') || '';
    editBtn.new_tab = c('f-newtab');
  }
  if (activeTab === 'exibicao') {
    editBtn.dynamic = c('f-dynamic');
    editBtn.single_use = c('f-single');
    editBtn.group_name = v('f-group') || '';
  }
}

function renderTab() {
  var body = document.getElementById('modal-body');
  if (activeTab === 'acoes') renderAcoes(body);
  else if (activeTab === 'condicoes') renderCondicoes(body);
  else renderExibicao(body);
}

    '<div class="form-group"><label class="form-label">Descrição</label><textarea class="form-textarea" id="f-desc" placeholder="Tooltip ao passar o mouse" rows="2">' + (b.description||'') + '</textarea></div>' +
    '<div class="form-group"><label class="form-label">Ação ao clicar</label><select class="form-select" id="f-action"><option value="webhook"' + (b.action_type==='webhook'?' selected':'') + '>⚡ Enviar para Webhook (POST)</option><option value="link"' + (b.action_type==='link'?' selected':'') + '>🔗 Seguir o link (abrir URL)</option><option value="modal"' + (b.action_type==='modal'?' selected':'') + '>🪟 Abrir modal personalizado</option></select></div>' +

// ── Aba Condições ──
function renderCondicoes(body) {
  var conds = editBtn.conditions || [];
  var html =

    '<div class="form-hint" style="margin-bottom:16px">O botão só aparecerá se TODAS as condições forem atendidas. Sem condições = sempre visível.</div>' +
    '<div id="cond-list">';

  if (!conds.length) {
    html += '<div style="text-align:center;padding:20px;font-size:13px;color:var(--sub);background:var(--bg3);border-radius:8px;border:1px dashed var(--border)">Nenhuma condição</div>';
  }

  for (var i = 0; i < conds.length; i++) {
    var c = conds[i];

      '<select class="form-select" style="width:auto" data-cond-field="' + i + '"><option value="label"' + (c.field==='label'?' selected':'') + '>Etiqueta</option><option value="inbox"' + (c.field==='inbox'?' selected':'') + '>Inbox</option><option value="team"' + (c.field==='team'?' selected':'') + '>Time</option><option value="status"' + (c.field==='status'?' selected':'') + '>Status</option></select>' +
      '<select class="form-select" style="width:auto" data-cond-op="' + i + '"><option value="equals"' + (c.op==='equals'?' selected':'') + '>é igual a</option><option value="contains"' + (c.op==='contains'?' selected':'') + '>contém</option><option value="not_equals"' + (c.op==='not_equals'?' selected':'') + '>não é</option></select>' +
      '<input class="form-input" style="flex:1" value="' + (c.value||'') + '" placeholder="valor" data-cond-val="' + i + '">' +
      '<button class="btn-icon" style="color:var(--danger)" data-cond-del="' + i + '">✕</button>' +
    '</div>';
  }

  html += '</div><button class="btn btn-secondary" style="width:100%;margin-top:10px" id="btn-add-cond">+ Adicionar condição</button>';
  body.innerHTML = html;

  // Bind events
  body.addEventListener('change', function(e) {

    if (t.hasAttribute('data-cond-op')) editBtn.conditions[parseInt(t.getAttribute('data-cond-op'))].op = t.value;

}

// ── Aba Exibição ──
function renderExibicao(body) {

  } else {
    tagsHTML = '<div style="display:flex;flex-wrap:wrap;">';

      var val = b.visible_to[i];
      var isTeam = val.startsWith('team:');

      var avatarClass = isTeam ? 'perm-avatar team' : 'perm-avatar';
      tagsHTML += '<div class="perm-item"><div class="' + avatarClass + '" style="font-size:'+(isTeam?'12px':'10px')+'">' + iconStr + '</div><span>' + displayName + '</span><button class="perm-remove" data-user-del="' + i + '">✕</button></div>';
    }

  }

  body.innerHTML =
    '<div class="form-group"><label class="form-label">Grupo / Pasta (Opcional)</label><input list="groups-list" class="form-input" id="f-group" value="' + (b.group_name||'') + '" placeholder="Ex: Vendas, Suporte...">' + groupsHTML + '<div class="form-hint">Botões com o mesmo grupo ficam juntos.</div></div>' +
    '<div class="checkbox-item"><input type="checkbox" id="f-dynamic"' + (b.dynamic?' checked':'') + '><div><label for="f-dynamic">Botão dinâmico</label><div class="hint">Ocultado por padrão, aparece via triggers</div></div></div>' +
    '<div class="checkbox-item"><input type="checkbox" id="f-single"' + (b.single_use?' checked':'') + '><div><label for="f-single">Botão de uso único</label><div class="hint">Desativa após o primeiro clique</div></div></div>' +
    '<div style="margin-top:16px"><label class="form-label">Exibir para (vazio = todos)</label></div>' +
    '<div class="form-hint" style="margin-bottom:10px">Marque times inteiros ou membros individuais. Deixe tudo desmarcado para todos verem.</div>' +
    '<div id="tree-select-container" class="tree-select"><div style="padding:20px;text-align:center;color:var(--sub);font-size:12px">⏳ Carregando times e agentes...</div></div>' +
    '<div style="margin-top:12px" id="perm-tags">' + tagsHTML + '</div>';

  // Populate tree if data already cached
  if (window.__brkCachedTeams && window.__brkCachedAgents) {

    buildTree(window.__brkCachedTeams, window.__brkCachedAgents);
  }

  body.addEventListener('click', function(e) {
    var t = e.target.closest('[data-user-del]');
    if (t) { editBtn.visible_to.splice(parseInt(t.getAttribute('data-user-del')), 1); renderTab(); }
  });
}

function buildTree(teams, agents) {
  var container = document.getElementById('tree-select-container');
  if (!container) return;
  var b = editBtn;
  if (!b) return;

  // Mark as built so MutationObserver doesn't re-trigger
  window.__brkTreeBuilt = true;

  // Save which groups are currently open
  var openGroups = {};
  var existingGroups = container.querySelectorAll('.tree-group');
  for (var og = 0; og < existingGroups.length; og++) {
    var idx = existingGroups[og].getAttribute('data-team-idx');
    var membersDiv = existingGroups[og].querySelector('.tree-members');
    if (membersDiv && membersDiv.classList.contains('open')) openGroups[idx] = true;
  }

  // Find agents that don't belong to any team
  var assignedEmails = {};
  for (var t = 0; t < teams.length; t++) {
    var members = teams[t].members || [];
    for (var m = 0; m < members.length; m++) {
      if (members[m].email) assignedEmails[members[m].email.toLowerCase()] = true;
    }
  }
  var unassigned = [];
  for (var a = 0; a < agents.length; a++) {
    if (agents[a].email && !assignedEmails[agents[a].email.toLowerCase()]) {
      unassigned.push(agents[a]);
    }
  }

  var html = '';

  // Render each team
  for (var t = 0; t < teams.length; t++) {
    var team = teams[t];
    var teamVal = 'team:' + team.name.toLowerCase();
    var members = team.members || [];
    var teamChecked = b.visible_to.indexOf(teamVal) !== -1;
    var checkedMembers = 0;
    for (var m = 0; m < members.length; m++) {
      if (members[m].email && b.visible_to.indexOf(members[m].email.toLowerCase()) !== -1) checkedMembers++;
    }
    var allMembersChecked = members.length > 0 && (teamChecked || checkedMembers === members.length);
    var isOpen = openGroups[String(t)];

    html += '<div class="tree-group" data-team-idx="' + t + '">';
    html += '<div class="tree-group-header">';
    html += '<span class="tree-arrow' + (isOpen ? ' open' : '') + '">▶</span>';
    html += '<input type="checkbox" class="tree-check" data-team-check="' + t + '"' + (allMembersChecked || teamChecked ? ' checked' : '') + '>';
    html += '<label>👥 ' + team.name + '</label>';
    html += '<span class="tree-count">' + members.length + ' membros</span>';
    html += '</div>';
    html += '<div class="tree-members' + (isOpen ? ' open' : '') + '">';
    for (var m = 0; m < members.length; m++) {
      var mb = members[m];
      var email = (mb.email || '').toLowerCase();
      var memberChecked = teamChecked || b.visible_to.indexOf(email) !== -1;
      html += '<div class="tree-member">';
      html += '<input type="checkbox" class="tree-check" data-member-email="' + email + '" data-team-parent="' + t + '"' + (memberChecked ? ' checked' : '') + '>';
      html += '<label>' + (mb.name || mb.email) + '</label>';
      if (mb.name && mb.email) html += '<span class="tree-member-email">(' + mb.email + ')</span>';
      html += '</div>';
    }
    html += '</div></div>';
  }

  // Render unassigned agents
  if (unassigned.length > 0) {
    var isOpenNone = openGroups['none'];
    html += '<div class="tree-group" data-team-idx="none">';
    html += '<div class="tree-group-header">';
    html += '<span class="tree-arrow' + (isOpenNone ? ' open' : '') + '">▶</span>';
    html += '<input type="checkbox" class="tree-check" data-team-check="none" style="visibility:hidden">';
    html += '<label>👤 Sem time</label>';
    html += '<span class="tree-count">' + unassigned.length + ' membros</span>';
    html += '</div>';
    html += '<div class="tree-members' + (isOpenNone ? ' open' : '') + '">';
    for (var u = 0; u < unassigned.length; u++) {
      var ua = unassigned[u];
      var email = (ua.email || '').toLowerCase();
      var uChecked = b.visible_to.indexOf(email) !== -1;
      html += '<div class="tree-member">';
      html += '<input type="checkbox" class="tree-check" data-member-email="' + email + '" data-team-parent="none"' + (uChecked ? ' checked' : '') + '>';
      html += '<label>' + (ua.name || ua.email) + '</label>';
      if (ua.name && ua.email) html += '<span class="tree-member-email">(' + ua.email + ')</span>';
      html += '</div>';
    }
    html += '</div></div>';
  }

  if (!html) {
    html = '<div style="padding:20px;text-align:center;color:var(--sub);font-size:12px">Nenhum agente ou time encontrado.</div>';
  }

  container.innerHTML = html;

  // ── Attach event listeners ONLY ONCE ──
  if (!container.getAttribute('data-tree-bound')) {
    container.setAttribute('data-tree-bound', 'true');

    // Toggle expand/collapse
    container.addEventListener('click', function(e) {
      var header = e.target.closest('.tree-group-header');
      if (header && !e.target.classList.contains('tree-check')) {
        var arrow = header.querySelector('.tree-arrow');
        var membersDiv = header.nextElementSibling;
        if (membersDiv) {
          membersDiv.classList.toggle('open');
          arrow.classList.toggle('open');
        }
      }
    });

    // Checkbox changes
    container.addEventListener('change', function(e) {
      var target = e.target;
      var currentBtn = editBtn;
      if (!currentBtn) return;
      var curTeams = window.__brkCachedTeams || [];

      if (target.hasAttribute('data-team-check')) {
        var tIdx = target.getAttribute('data-team-check');
        if (tIdx === 'none') return;
        var team = curTeams[parseInt(tIdx)];
        if (!team) return;
        var teamVal = 'team:' + team.name.toLowerCase();
        var members = team.members || [];

        if (target.checked) {
          if (currentBtn.visible_to.indexOf(teamVal) === -1) currentBtn.visible_to.push(teamVal);
          for (var i = 0; i < members.length; i++) {
            var em = (members[i].email || '').toLowerCase();
            var idx = currentBtn.visible_to.indexOf(em);
            if (idx !== -1) currentBtn.visible_to.splice(idx, 1);
          }
        } else {
          var idx = currentBtn.visible_to.indexOf(teamVal);
          if (idx !== -1) currentBtn.visible_to.splice(idx, 1);
        }
        updatePermTags(currentBtn);
        buildTree(curTeams, window.__brkCachedAgents || []);
      }

      if (target.hasAttribute('data-member-email')) {
        var email = target.getAttribute('data-member-email');
        var parentIdx = target.getAttribute('data-team-parent');

        if (target.checked) {
          if (currentBtn.visible_to.indexOf(email) === -1) currentBtn.visible_to.push(email);
        } else {
          var idx = currentBtn.visible_to.indexOf(email);
          if (idx !== -1) currentBtn.visible_to.splice(idx, 1);
          if (parentIdx !== 'none') {
            var team = curTeams[parseInt(parentIdx)];
            if (team) {
              var teamVal = 'team:' + team.name.toLowerCase();
              var teamIdx = currentBtn.visible_to.indexOf(teamVal);
              if (teamIdx !== -1) {
                currentBtn.visible_to.splice(teamIdx, 1);
                var members = team.members || [];
                for (var i = 0; i < members.length; i++) {
                  var em = (members[i].email || '').toLowerCase();
                  if (em !== email && currentBtn.visible_to.indexOf(em) === -1) currentBtn.visible_to.push(em);
                }
              }
            }
          }
        }
        updatePermTags(currentBtn);
        buildTree(curTeams, window.__brkCachedAgents || []);
      }
    });
  }
}

// Update only the tags/pills area without full tab re-render
function updatePermTags(b) {
  var tagsContainer = document.getElementById('perm-tags');
  if (!tagsContainer) return;
  var tagsHTML = '';
  if (!b.visible_to || !b.visible_to.length) {
    tagsHTML = '<div style="text-align:center;padding:16px;font-size:12px;color:var(--sub);background:var(--bg3);border-radius:8px;border:1px dashed var(--border)">👁 Visível para todos</div>';
  } else {
    tagsHTML = '<div style="display:flex;flex-wrap:wrap;">';
    for (var i = 0; i < b.visible_to.length; i++) {
      var val = b.visible_to[i];
      var isTeam = val.startsWith('team:');
      var displayName = isTeam ? val.substring(5) : val;
      var iconStr = isTeam ? '👥' : displayName.substring(0,2).toUpperCase();
      var avatarClass = isTeam ? 'perm-avatar team' : 'perm-avatar';
      tagsHTML += '<div class="perm-item"><div class="' + avatarClass + '" style="font-size:'+(isTeam?'12px':'10px')+'">' + iconStr + '</div><span>' + displayName + '</span><button class="perm-remove" data-user-del="' + i + '">✕</button></div>';
    }
    tagsHTML += '</div>';
  }
  tagsContainer.innerHTML = tagsHTML;
}

// ── Save ──
function saveButton() {
  syncForm();
  if (!editBtn.label || !editBtn.label.trim()) { alert('Preencha o texto do botão.'); return; }

  var method, path;
  if (editIdx === null) {
    method = 'POST';
    path = '/buttons';
  } else {
    method = 'PUT';
    path = '/buttons/' + editBtn.id;
  }

  api(path, method, editBtn).then(function() {
    closeEditor();
    load();
  }).catch(function(err) {
    console.error('Save error:', err);
    alert('Erro ao salvar botão.');
  });
}

// ── Start ──
load();
</script>
 <script>
    // =======================================================
    // INTEGRAÇÃO: Recebe agentes e times do Chatwoot e popula tree-select
    // =======================================================
    (function() {
        window.__brkCachedAgents = [];
        window.__brkCachedTeams = [];
        window.__brkTreeBuilt = false;
        
        // Pede a lista ao Chatwoot logo que abre
        window.parent.postMessage({ action: 'GET_AGENTS' }, '*');
        window.parent.postMessage({ action: 'GET_TEAMS' }, '*');
        
        // Quando o Chatwoot responder, guarda a lista e tenta popular a árvore
        window.addEventListener('message', function(e) {
            if (e.data && e.data.action === 'SET_AGENTS') {
                window.__brkCachedAgents = e.data.agents || [];
                window.__brkTreeBuilt = false;
                tryBuildTree();
            }
            if (e.data && e.data.action === 'SET_TEAMS') {
                window.__brkCachedTeams = e.data.teams || [];
                window.__brkTreeBuilt = false;
                tryBuildTree();
            }
        });

        function tryBuildTree() {
            if (window.__brkTreeBuilt) return;
            var container = document.getElementById('tree-select-container');
            if (!container) return;
            if (window.__brkCachedTeams.length > 0 && window.__brkCachedAgents.length > 0) {
                if (typeof buildTree === 'function') {
                    window.__brkTreeBuilt = true;
                    buildTree(window.__brkCachedTeams, window.__brkCachedAgents);
                }
            }
        }

        // Observer: quando a tree-select container aparecer, tenta popular
        var observer = new MutationObserver(function() {
            if (!window.__brkTreeBuilt) {
                tryBuildTree();
            }
        });
        observer.observe(document.body, { childList: true, subtree: true });
    })();
    </script>
